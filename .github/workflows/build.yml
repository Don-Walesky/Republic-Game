name: Build and Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v6.0.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Republic.sln

      - name: Build
        run: dotnet build Republic.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Republic.sln --configuration Release --no-build --collect:"XPlat Code Coverage"
